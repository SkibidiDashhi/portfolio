<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dash Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES — edit these to retheme the site
    ============================================================ */
    :root {
      --bg:           #020818;
      --glass-bg:     rgba(2, 4, 12, 0.6);
      --glass-border: rgba(100, 149, 255, 0.12);
      --neon-a:       #3b82f6;   /* bright blue      */
      --neon-b:       #818cf8;   /* indigo           */
      --neon-c:       #60a5fa;   /* sky blue         */
      --text-primary: #e8f0ff;
      --text-muted:   #6b83b8;
      --card-radius:  28px;
      --transition:   0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

    /* ── CUSTOM CURSOR ─────────────────────────────────────────── */
    * { cursor: none !important; }
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      pointer-events: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--neon-a);
      transform: translate(-50%,-50%);
      transition: width .25s, height .25s, background .25s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 9998;
      pointer-events: none;
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid rgba(2, 15, 36, 0.5);
      transform: translate(-50%,-50%);
      transition: width .3s, height .3s, opacity .3s;
    }
    body.cursor-hover #cursor      { width: 18px; height: 18px; background: var(--neon-b); }
    body.cursor-hover #cursor-ring { width: 54px; height: 54px; opacity: .6; }

    /* ── LOADING SCREEN ────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px;
      transition: opacity .8s ease, visibility .8s;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-logo {
      font-family: 'Syne', sans-serif;
      font-size: 3rem; font-weight: 800; letter-spacing: .35em;
      background: linear-gradient(135deg, var(--neon-a), var(--neon-b), var(--neon-c));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%,100% { filter: drop-shadow(0 0 8px var(--neon-a)); }
      50%     { filter: drop-shadow(0 0 24px var(--neon-b)); }
    }
    .loader-bar-wrap {
      width: 180px; height: 2px;
      background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden;
    }
    .loader-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--neon-a), var(--neon-b));
      border-radius: 999px;
      animation: loadBar 2s ease forwards;
    }
    @keyframes loadBar { to { width: 100%; } }
    .loader-text {
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem; letter-spacing: .3em; color: var(--text-muted); text-transform: uppercase;
    }

    /* ── VIDEO BACKGROUND ──────────────────────────────────────── */
    /*
      ════════════════════════════════════════════════════════
      HOW TO ADD YOUR TIKTOK VIDEO (3 simple steps):

        1. Go to  ssstik.io  — paste your TikTok link
        2. Download the MP4  (pick "Without watermark")
        3. Rename it  bg.mp4  and put it in the SAME folder
           as this  index.html  file

      Then open the site and click "Enter Sound" — the video
      plays full-screen WITH its original audio, faded in
      smoothly. Clicking again mutes it back.
      ════════════════════════════════════════════════════════
    */
    #video-bg {
      position: fixed; inset: 0; z-index: 0;
      width: 100%; height: 100%; object-fit: cover;
      opacity: .55;
    }

    /* Animated CSS fallback while video loads / if no video found */
    #video-bg-fallback {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(29,53,180,.4) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(15,30,120,.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(2,8,40,.9) 0%, transparent 100%),
        #020818;
      animation: bgShift 16s ease-in-out infinite alternate;
      transition: opacity 1s;
    }
    #video-bg-fallback.hidden { opacity: 0; pointer-events: none; }
    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg); }
      50%  { filter: hue-rotate(30deg); }
      100% { filter: hue-rotate(-20deg); }
    }

    #overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(3,3,3,.4)  0%,
        rgba(3,3,3,.15) 40%,
        rgba(3,3,3,.65) 100%
      );
    }

    /* ── PARTICLES ─────────────────────────────────────────────── */
    #particles-canvas { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* ── ENTER SOUND BUTTON ────────────────────────────────────── */
    #enter-btn {
      position: fixed; top: 28px; right: 32px; z-index: 50;
      font-family: 'Syne', sans-serif;
      font-size: .65rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--text-primary);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 10px 20px; border-radius: 999px;
      cursor: pointer !important;
      transition: var(--transition);
      display: flex; align-items: center; gap: 8px;
      opacity: 0; animation: fadeInDown .6s 2.5s ease forwards;
    }
    #enter-btn:hover {
      background: rgba(59,130,246,.18);
      border-color: rgba(59,130,246,.45);
      box-shadow: 0 0 20px rgba(59,130,246,.25);
    }
    #enter-btn .icon::before         { content: '🔇'; }
    #enter-btn.playing .icon::before { content: '🔊'; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MAIN SCENE ────────────────────────────────────────────── */
    #scene {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      animation: sceneFadeIn 1s 2.2s ease forwards;
    }
    @keyframes sceneFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── GLASS CARD ────────────────────────────────────────────── */
    .card {
      position: relative;
      width: min(420px, 92vw);
      padding: 48px 40px 40px;
      border-radius: var(--card-radius);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      box-shadow:
        0 0 0 1px rgb(255, 255, 255) inset,
        0 40px 80px rgba(0,0,0,.7),
        0 0 60px rgba(255, 255, 255, 0.08);
      text-align: center; overflow: hidden;
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .card::before {
      content: '';
      position: absolute; inset: -1px;
      border-radius: calc(var(--card-radius) + 1px);
      background: linear-gradient(135deg,rgba(59,130,246,.25),rgba(129,140,248,.15),rgba(96,165,250,.2));
      opacity: 0; transition: opacity .5s; z-index: -1;
    }
    .card:hover::before { opacity: 1; }
    .card::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
      transform: skewX(-20deg);
      animation: sheen 6s 3s ease-in-out infinite;
    }
    @keyframes sheen { 0% { left:-100%; } 30%,100% { left:140%; } }

    /* ── AVATAR ────────────────────────────────────────────────── */
    .avatar-wrap { position: relative; width: 96px; height: 96px; margin: 0 auto 24px; }
    .avatar-ring {
      position: absolute; inset: -5px; border-radius: 50%;
      background: conic-gradient(var(--neon-a), var(--neon-b), var(--neon-c), var(--neon-a));
      animation: spinRing 4s linear infinite;
    }
    @keyframes spinRing { to { transform: rotate(360deg); } }
    .avatar-ring-mask { position: absolute; inset: 3px; border-radius: 50%; background: var(--bg); }
    .avatar-img {
      position: absolute; inset: 0; border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#030d2e,#060e38);
      font-size: 2.8rem;
      /*
        REPLACE with your photo:
        <img src="avatar.jpg" style="width:100%;height:100%;object-fit:cover;" />
      */
    }

    /* ── TYPOGRAPHY ────────────────────────────────────────────── */
    .username {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800; letter-spacing: -.01em;
      background: linear-gradient(135deg,#fff 30%,rgba(96,165,250,.9));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px; line-height: 1.1;
    }
    .typing-wrap {
      height: 22px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
    }
    .typing-text {
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 300; font-style: italic;
      color: var(--text-muted); letter-spacing: .04em;
    }
    .cursor-blink {
      display: inline-block; width: 1.5px; height: 14px;
      background: var(--neon-a); margin-left: 2px; vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
    .divider {
      width: 40px; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--neon-a), transparent);
      margin: 0 auto 28px; border-radius: 999px;
    }

    /* ── SOCIAL BUTTONS ────────────────────────────────────────── */
    .social-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .social-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      font-family: 'Syne', sans-serif;
      font-size: .68rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; text-decoration: none; color: var(--text-primary);
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      transition: var(--transition);
      position: relative; overflow: hidden;
      cursor: pointer !important;
    }
    .social-btn[data-platform="discord"]  { --glow: 88,101,242; }
    .social-btn[data-platform="telegram"] { --glow: 41,182,246; }
    .social-btn[data-platform="tiktok"]   { --glow: 255,0,80; }
    .social-btn::before {
      content: ''; position: absolute; inset: 0; opacity: 0;
      background: radial-gradient(circle at center, rgba(var(--glow),.2), transparent 70%);
      transition: opacity .3s;
    }
    .social-btn:hover::before { opacity: 1; }
    .social-btn:hover {
      border-color: rgba(var(--glow),.5);
      box-shadow: 0 0 20px rgba(var(--glow),.25), 0 0 6px rgba(var(--glow),.15) inset;
      transform: translateY(-2px) scale(1.03);
      color: #fff;
    }
    .social-icon { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .social-icon svg { width: 100%; height: 100%; fill: currentColor; }

    /* ── AUDIO VISUALIZER ──────────────────────────────────────── */
    #visualizer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 11;
      height: 64px;
      display: flex; align-items: flex-end; justify-content: center;
      gap: 3px; padding: 0 0 12px;
      opacity: 0; transition: opacity 1s; pointer-events: none;
    }
    #visualizer.active { opacity: 1; }
    .viz-bar {
      width: 3px; border-radius: 3px 3px 0 0;
      background: linear-gradient(to top, var(--neon-a), var(--neon-b));
      animation: vizBounce .8s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    @keyframes vizBounce { from { transform: scaleY(.1); } to { transform: scaleY(1); } }

    /* ── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .username { font-size: 1.6rem; }
      #enter-btn { top: 16px; right: 16px; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- ── LOADING SCREEN ─────────────────────────────────────────── -->
<div id="loader">
  <div class="loader-logo">Dash</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>

</div>

<!-- ══════════════════════════════════════════════════════════════
     VIDEO BACKGROUND
     ──────────────────────────────────────────────────────────────
     STEP 1 → Go to  ssstik.io  and paste your TikTok link
     STEP 2 → Download the MP4 (click "Without watermark")
     STEP 3 → Rename it  bg.mp4
     STEP 4 → Put  bg.mp4  in the SAME folder as index.html

     • The video autoplays silently (required by browsers).
     • Clicking "Enter Sound" unmutes it with a smooth fade-in.
     • Clicking again mutes it back.
══════════════════════════════════════════════════════════════ -->
<video id="video-bg" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4" />
</video>

<!-- Animated gradient shown while video loads -->
<div id="video-bg-fallback"></div>

<!-- Readability overlay -->
<div id="overlay"></div>

<!-- Floating particles -->
<canvas id="particles-canvas"></canvas>

<!-- ── ENTER SOUND BUTTON ──────────────────────────────────────── -->
<button id="enter-btn" aria-label="Toggle video sound">
  <span class="icon"></span>
  <span class="label">Enter Sound</span>
</button>

<!-- ── MAIN SCENE ─────────────────────────────────────────────── -->
<div id="scene">
  <div class="card" id="main-card">

    <!-- AVATAR
         To use YOUR photo:
         1. Put your image file (e.g. avatar.jpg) in the same folder as index.html
         2. Delete the emoji line below
         3. Uncomment the <img> line
    -->
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-ring-mask"></div>
      <div class="avatar-img">
        <!-- DELETE this emoji and UNCOMMENT the line below to use your photo -->
        <img src="avatar.jpg" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
        <!-- <img src="avatar.jpg" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" /> -->
      </div>
    </div>

    <!-- USERNAME — change to yours -->
    <div class="username">@Dash</div>

    <!-- TYPING BIO — phrases edited in JS below -->
    <div class="typing-wrap">
      <span class="typing-text" id="typing-el"></span>
      <span class="cursor-blink"></span>
    </div>

    <div class="divider"></div>

    <!-- SOCIAL LINKS — update each href -->
    <div class="social-grid">

      <a class="social-btn" data-platform="discord"
         href="https://discord.com/users/1498729171185303563" target="_blank" rel="noopener">
        <span class="social-icon">
          <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.995a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>

      <a class="social-btn" data-platform="telegram"
         href="https://t.me/qunixivll" target="_blank" rel="noopener">
        <span class="social-icon">
          <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>

          <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.26 6.26 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.2 8.2 0 004.79 1.53V6.78a4.85 4.85 0 01-1.02-.09z"/></svg>

    </div>
  </div>
</div>

<!-- Visualizer bars -->
<div id="visualizer"></div>

<script>
/* ─── CUSTOM CURSOR ──────────────────────────────────────────── */
const cursor     = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');
let mx = -100, my = -100, rx = -100, ry = -100;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function loop() {
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  cursorRing.style.left = rx + 'px'; cursorRing.style.top = ry + 'px';
  requestAnimationFrame(loop);
})();
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});

/* ─── LOADING SCREEN ─────────────────────────────────────────── */
window.addEventListener('load', () =>
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 2200)
);

/* ─── VIDEO + SOUND CONTROL ──────────────────────────────────── */
const videoBg       = document.getElementById('video-bg');
const videoFallback = document.getElementById('video-bg-fallback');
const enterBtn      = document.getElementById('enter-btn');
const visualizer    = document.getElementById('visualizer');
let soundOn = false;

// Hide CSS fallback as soon as video data is ready
videoBg.addEventListener('canplay', () =>
  videoFallback.classList.add('hidden'), { once: true }
);

// Build visualizer bars
const bars = Array.from({ length: 40 }, (_, i) => {
  const b = document.createElement('div');
  b.className = 'viz-bar';
  b.style.cssText = `height:${10 + Math.random()*40}px;animation-delay:${(i/40*.8).toFixed(2)}s;animation-duration:${(.5+Math.random()*.7).toFixed(2)}s;`;
  visualizer.appendChild(b);
  return b;
});

function animateBars() {
  if (!soundOn) return;
  bars.forEach(b => { b.style.height = (8 + Math.random() * 44) + 'px'; });
  setTimeout(animateBars, 120);
}

enterBtn.addEventListener('click', () => {
  if (!soundOn) {
    // Unmute video and fade volume up to 100%
    videoBg.muted = false;
    videoBg.volume = 0;
    videoBg.play().catch(() => {});
    let v = 0;
    const fi = setInterval(() => {
      v = Math.min(v + 0.04, 1);
      videoBg.volume = v;
      if (v >= 1) clearInterval(fi);
    }, 60);

    soundOn = true;
    visualizer.classList.add('active');
    enterBtn.classList.add('playing');
    enterBtn.querySelector('.label').textContent = 'Mute';
    animateBars();

  } else {
    // Fade volume down then mute
    let v = videoBg.volume;
    const fo = setInterval(() => {
      v = Math.max(v - 0.04, 0);
      videoBg.volume = v;
      if (v <= 0) { videoBg.muted = true; clearInterval(fo); }
    }, 60);

    soundOn = false;
    visualizer.classList.remove('active');
    enterBtn.classList.remove('playing');
    enterBtn.querySelector('.label').textContent = 'Enter Sound';
  }
});

/* ─── TYPING EFFECT ──────────────────────────────────────────── */
// EDIT these lines — they cycle as the animated bio subtitle
const phrases = [
  'contact for work.',
  'if you want to make website like this.',
  'dash always here.',
];
let pIdx = 0, cIdx = 0, deleting = false;
const typingEl = document.getElementById('typing-el');
function type() {
  const phrase = phrases[pIdx];
  if (!deleting) {
    typingEl.textContent = phrase.slice(0, ++cIdx);
    if (cIdx === phrase.length) { deleting = true; setTimeout(type, 1800); return; }
  } else {
    typingEl.textContent = phrase.slice(0, --cIdx);
    if (cIdx === 0) { deleting = false; pIdx = (pIdx + 1) % phrases.length; }
  }
  setTimeout(type, deleting ? 40 : 80);
}
setTimeout(type, 3200);

/* ─── FLOATING PARTICLES ─────────────────────────────────────── */
const canvas = document.getElementById('particles-canvas');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const COLORS = ['#3b82f6','#818cf8','#60a5fa','#1d4ed8'];
class Particle {
  constructor() { this.reset(true); }
  reset(init=false) {
    this.x=Math.random()*canvas.width;
    this.y=init?Math.random()*canvas.height:canvas.height+10;
    this.r=Math.random()*1.8+0.4;
    this.vy=-(Math.random()*0.4+0.1);
    this.vx=(Math.random()-0.5)*0.3;
    this.alpha=Math.random()*0.5+0.15;
    this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
  }
  update() { this.x+=this.vx; this.y+=this.vy; if(this.y<-10)this.reset(); }
  draw() {
    ctx.save();
    ctx.globalAlpha=this.alpha; ctx.shadowBlur=8; ctx.shadowColor=this.color; ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}
const particles = Array.from({length:70},()=>new Particle());
(function drawLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(drawLoop);
})();

/* ─── CARD 3D TILT ───────────────────────────────────────────── */
const card = document.getElementById('main-card');
card.addEventListener('mousemove', e => {
  const r=card.getBoundingClientRect();
  const x=((e.clientX-r.left)/r.width -0.5)*10;
  const y=((e.clientY-r.top) /r.height-0.5)*10;
  card.style.transform=`perspective(800px) rotateY(${x}deg) rotateX(${-y}deg)`;
});
card.addEventListener('mouseleave',()=>{
  card.style.transform='perspective(800px) rotateY(0) rotateX(0)';
});
</script>
</body>
</html>
